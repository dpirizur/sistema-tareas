<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>

  <!-- Edificio/Salas representado -->
  <g transform="translate(32, 32)">
    <!-- Cuerpo del edificio -->
    <rect x="-14" y="-18" width="28" height="28" rx="2" fill="url(#buildingGradient)" opacity="0.9"/>

    <!-- Ventanas (representan salas) -->
    <!-- Fila superior -->
    <rect x="-10" y="-14" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>
    <rect x="-2" y="-14" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>
    <rect x="6" y="-14" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>

    <!-- Fila media -->
    <rect x="-10" y="-6" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>
    <rect x="-2" y="-6" width="5" height="5" fill="#06b6d4" opacity="0.9"/>
    <rect x="6" y="-6" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>

    <!-- Fila inferior -->
    <rect x="-10" y="2" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>
    <rect x="-2" y="2" width="5" height="5" fill="#0ea5e9" opacity="0.8"/>
    <rect x="6" y="2" width="5" height="5" fill="#06b6d4" opacity="0.9"/>

    <!-- Puerta/Entrada -->
    <rect x="-4" y="10" width="8" height="8" rx="1" fill="#64748b" opacity="0.7"/>
    <circle cx="-1" cy="14" r="1.5" fill="#fbbf24" opacity="0.8"/>
  </g>
</svg>
